  :root{ --ink:#f1e3cf; --dim:#a98f86; --gold:#ffce4d; --line:#5a3a38; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:'Cubic 11','Courier New',monospace; background:#0b0708; color:var(--ink);
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:14px;
    image-rendering:pixelated; -webkit-font-smoothing:none; -webkit-user-select:none; user-select:none; }
  .tag{ position:fixed; top:8px; right:10px; z-index:60; background:#000; color:var(--gold);
    border:2px solid var(--gold); font-size:13px; padding:3px 8px; }
  .frame{ width:900px; max-width:100%; border:3px solid var(--line);
    box-shadow:0 0 0 3px #000, 0 6px 0 #000; background:#180d0e; }

  /* ---------- 舞台（Phaser） ---------- */
  .stage{ position:relative; height:380px; overflow:hidden; image-rendering:pixelated;
    background:#0a0608; border-bottom:3px solid var(--line); }
  #game{ position:absolute; inset:0; }
  #game canvas{ image-rendering:pixelated; }
  /* 飄字層（與文字框同為 HTML，字級用真實 px）*/
  #floatLayer{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:5; }
  .float{ position:absolute; transform:translate(-50%,-50%); white-space:nowrap;
    font-family:'Cubic 11','Courier New',monospace; text-shadow:0 2px 0 #000, 0 0 7px #000; opacity:1;
    transition:transform .8s cubic-bezier(.2,.7,.3,1), opacity .8s ease-out; }
  .float.rise{ transform:translate(-50%,-50%) translateY(-62px); opacity:0; }
  .mhp{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:48%; z-index:3;
    background:rgba(15,8,9,.88); border:3px solid var(--line); padding:6px 14px;
    display:flex; align-items:center; gap:10px; pointer-events:none; }
  .mhp .nm{ font-size:19px; white-space:nowrap; }
  .bar{ flex:1; height:14px; background:#2a0d0d; border:2px solid #000; overflow:hidden; }
  .bar>i{ display:block; height:100%; background:linear-gradient(#62c24a,#2f8a30); transition:width .3s; }
  .bar.low>i{ background:linear-gradient(#ffce4d,#d68a1f); } .bar.crit>i{ background:linear-gradient(#ff6b6b,#c01f1f); }
  .mhp .num{ font-size:15px; color:var(--dim); white-space:nowrap; }
  .mhp .bar>i{ background:linear-gradient(#ff6b6b,#c01f1f); }
  .mhp .bar.low>i{ background:linear-gradient(#ff9a3d,#d6701f); }
  .mhp .bar.crit>i{ background:linear-gradient(#ffce4d,#d68a1f); }

  /* ---------- 分頁列：職業分頁 ＋ 隊伍HP/金幣 ---------- */
  .toprow{ display:flex; border-bottom:3px solid var(--line); align-items:stretch; }
  .tabs{ display:flex; }
  .tab{ font-family:inherit; cursor:pointer; font-size:21px; background:transparent; color:var(--ink);
    padding:10px 22px; border:none; border-right:3px solid var(--line);
    display:flex; flex-direction:column; align-items:center; }
  .tab .pin{ display:block; font-size:12px; color:var(--dim); margin-top:1px; }
  .tab.current{ color:var(--gold); box-shadow:inset 0 0 0 3px var(--gold); }
  .tab.done{ background:#3a2c2a; color:#8a7470; } .tab.done .pin{ color:#6f5b58; }
  .teamhp{ flex:1; display:flex; align-items:center; gap:10px; padding:0 16px; }
  .teamhp .lbl{ font-size:16px; color:var(--dim); white-space:nowrap; }
  .gold{ font-size:16px; color:var(--gold); white-space:nowrap; }

  /* ---------- 指令面板：左大職業名 ＋ 右指令格 ---------- */
  .panel{ display:flex; height:230px; }
  .who{ width:220px; border-right:3px solid var(--line); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:26px; padding:14px; }
  .who .cls{ font-size:38px; color:var(--gold); }
  .who .pname{ font-size:20px; text-decoration:underline; text-underline-offset:3px; }
  /* 招式格：固定高度＋可滾動，容納未來新增技能 */
  .cmds{ flex:1; display:grid; grid-template-columns:1fr 1fr; gap:18px 22px;
    align-content:start; padding:18px 28px; overflow-y:auto; }
  .cmds::-webkit-scrollbar{ width:10px; }
  .cmds::-webkit-scrollbar-thumb{ background:#5a3a38; border:2px solid #180d0e; }
  .cmd{ font-family:inherit; cursor:pointer; font-size:23px; color:var(--ink); background:transparent;
    border:none; text-align:left; padding:4px; display:flex; flex-direction:column; gap:3px; }
  .cmd .t::before{ content:'▸ '; color:var(--gold); }
  .cmd:hover .t{ color:var(--gold); }
  .cmd .sub{ font-size:13px; color:var(--dim); padding-left:18px; }

  /* ---------- 戰鬥文字框 ---------- */
  .narrate{ display:none; position:relative; min-height:230px; padding:18px 24px 30px;
    font-size:22px; line-height:1.7; cursor:pointer; }
  .narrate p{ margin:3px 0; }
  .narrate p.sys{ color:var(--gold); } .narrate p.you{ color:#bfe9b0; } .narrate p.enemy{ color:#ff9f9f; }
  .cursor{ position:absolute; right:18px; bottom:8px; color:var(--gold); font-size:22px; display:none; animation:blink .7s steps(2) infinite; }
  @keyframes blink{ 50%{opacity:0;} }

  .foot{ display:flex; justify-content:space-between; align-items:center; padding:7px 16px;
    border-top:3px solid var(--line); font-size:14px; color:var(--dim); gap:10px; }
  .foot .right{ display:flex; gap:8px; }
  .foot button{ font-family:inherit; font-size:14px; cursor:pointer; background:#2a1a1a; color:var(--ink);
    border:2px solid var(--line); padding:5px 14px; }

  /* ---------- 3D 骰子覆蓋層 ---------- */
  #diceOverlay{ position:fixed; inset:0; z-index:100; display:none;
    background:radial-gradient(circle at 50% 42%, rgba(40,24,22,.55) 0%, rgba(6,4,5,.92) 70%);
    flex-direction:column; align-items:center; justify-content:center; }
  #diceOverlay.show{ display:flex; }
  .diceWho{ color:#ffe7d6; font-size:22px; margin-bottom:8px; text-shadow:0 2px 6px #000; }
  #diceStage{ width:340px; height:340px; touch-action:none; }
  .diceHint{ color:#cbb6b0; font-size:16px; margin-top:8px; animation:blink 1s steps(2) infinite; }
  .diceResult{ position:fixed; left:0; right:0; bottom:13%; text-align:center;
    color:var(--gold); font-size:32px; font-weight:bold; opacity:0; transition:opacity .25s; text-shadow:0 2px 8px #000; }
</style>
</head>
<body>
<div class="tag">PHASER 戰鬥</div>

<div class="frame">
  <div class="stage">
    <div id="game"></div>
    <div id="floatLayer"></div>
    <div class="mhp">
      <span class="nm">ドラキー</span>
      <span class="bar" id="mbar"><i style="width:100%"></i></span>
      <span class="num" id="mnum">60/60</span>
    </div>
  </div>

  <div class="toprow">
    <div class="tabs" id="tabs"></div>
    <div class="teamhp">
      <span class="lbl">隊伍HP</span>
      <span class="bar" id="tbar"><i style="width:100%"></i></span>
      <span class="num" id="tnum" style="font-size:15px;color:var(--dim)">100/100</span>
      <span class="gold" id="gold">💰 0</span>
    </div>
  </div>

  <div class="panel" id="selectPanel">
    <div class="who"><div class="cls" id="curcls">戰士</div><div class="pname" id="curname">王梓睿</div></div>
    <div class="cmds" id="cmds"></div>
  </div>

  <div class="narrate" id="narrate"><span class="cursor" id="cursor">▽</span></div>

  <div class="foot">
    <span id="phase">選擇階段：依序為每位冒險者下指令</span>
    <span class="right">
      <button id="musBtn">♪ 關</button>
      <button id="reset">↻ 重置戰鬥</button>
    </span>
  </div>
</div>

<!-- 3D 骰子 -->
<div id="diceOverlay">
  <div class="diceWho" id="diceWho">擲骰</div>
  <div id="diceStage"></div>
  <div class="diceHint" id="diceHint">🎲 點一下骰子來擲骰</div>
  <div class="diceResult" id="diceResult"></div>
</div>

<audio id="bgm" src="assets/music/battle1.ogg" loop preload="auto"></audio>

/* =================== 3D D20 骰子（three.js 覆蓋層） =================== */
const Dice=(()=>{
  const V3=THREE.Vector3, Q=THREE.Quaternion;
  let renderer,scene,camera,group,faces=[],state='idle',onDone=null;
  let omega=new V3(),rollT=0,holdT=0,qStart=new Q(),qEnd=new Q(),tSettle=0,resultLabel=20;

  function numTexture(n){
    const s=220,c=document.createElement('canvas');c.width=c.height=s;const x=c.getContext('2d');
    const fs=String(n).length>1?104:128; x.font=fs+"px Algerian,'Times New Roman',serif";
    x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='rgba(0,0,0,0.6)';x.fillText(String(n),s/2+2.5,s/2+3.5);
    x.fillStyle='#f4efe3';x.fillText(String(n),s/2,s/2);
    const t=new THREE.CanvasTexture(c);t.anisotropy=8;return t;
  }
  function faceUp(a,b,c){
    const cand=[[a,b,c],[b,c,a],[c,a,b]];let best=null,bestY=-Infinity;
    for(const [p,q,apex] of cand){ const mid=new V3().addVectors(p,q).multiplyScalar(0.5);
      const up=new V3().subVectors(apex,mid).normalize(); if(up.y>bestY){bestY=up.y;best=up;} }
    return best;
  }
  function build(){
    const geo=new THREE.IcosahedronGeometry(1,0);
    const mat=new THREE.MeshStandardMaterial({color:0x2c2c32,roughness:0.55,metalness:0.12,flatShading:true});
    group=new THREE.Group(); group.add(new THREE.Mesh(geo,mat));
    group.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0x000000})));
    const pos=geo.attributes.position;
    for(let i=0;i<pos.count;i+=3){
      const a=new V3().fromBufferAttribute(pos,i),b=new V3().fromBufferAttribute(pos,i+1),c=new V3().fromBufferAttribute(pos,i+2);
      const centroid=new V3().addVectors(a,b).add(c).multiplyScalar(1/3);
      const normal=centroid.clone().normalize(); const up=faceUp(a,b,c);
      const xAxis=new V3().crossVectors(up,normal).normalize();
      const mm=new THREE.Matrix4().makeBasis(xAxis,up,normal);
      faces.push({centroid,normal,quat:new Q().setFromRotationMatrix(mm)});
    }
    const labels=new Array(faces.length).fill(0);let cur=1;
    for(let i=0;i<faces.length;i++){ if(labels[i])continue; labels[i]=cur; let best=-1,bd=2;
      for(let j=0;j<faces.length;j++){ if(j===i||labels[j])continue; const d=faces[i].normal.dot(faces[j].normal); if(d<bd){bd=d;best=j;} }
      if(best>=0)labels[best]=21-cur; cur++; }
    faces.forEach((f,i)=>{ const plane=new THREE.Mesh(new THREE.PlaneGeometry(0.62,0.62),
      new THREE.MeshBasicMaterial({map:numTexture(labels[i]),transparent:true,side:THREE.FrontSide,depthWrite:false}));
      plane.position.copy(f.centroid).addScaledVector(f.normal,0.015); plane.quaternion.copy(f.quat);
      f.label=labels[i]; group.add(plane); });
    scene.add(group);
    const twenty=faces.find(f=>f.label===20); group.quaternion.copy(twenty.quat).invert();
  }
  function init(){
    const mount=document.getElementById('diceStage');
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(30,1,0.1,100); camera.position.set(0,0,5);
    scene.add(new THREE.AmbientLight(0xffffff,0.62));
    const key=new THREE.DirectionalLight(0xfff1d8,0.9);key.position.set(-3,4,5);scene.add(key);
    const fill=new THREE.DirectionalLight(0xc6d6ff,0.22);fill.position.set(3,-2,2);scene.add(fill);
    renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    const s=Math.max(mount.clientWidth,1); renderer.setSize(s,s);
    mount.appendChild(renderer.domElement);
    build(); bindControls(); loop();
  }
  let dragging=false,moved=false,lx=0,ly=0;
  function bindControls(){
    const el=renderer.domElement;
    el.addEventListener('pointerdown',e=>{dragging=true;moved=false;lx=e.clientX;ly=e.clientY;});
    el.addEventListener('pointermove',e=>{ if(!dragging)return;
      const dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;
      if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
      if(state==='idle'){ const qx=new Q().setFromAxisAngle(new V3(0,1,0),dx*0.01);
        const qy=new Q().setFromAxisAngle(new V3(1,0,0),dy*0.01); group.quaternion.premultiply(qx).premultiply(qy); } });
    el.addEventListener('pointerup',()=>{ dragging=false; if(!moved)roll(); });
  }
  function roll(){ if(state!=='idle')return;
    document.getElementById('diceResult').style.opacity=0; document.getElementById('diceHint').style.display='none';
    omega.set(Math.random()*2-1,Math.random()*2-1,Math.random()*2-1).normalize().multiplyScalar(20+Math.random()*12);
    rollT=0; state='rolling'; }
  function stopRoll(){ omega.set(0,0,0); let best=faces[0],bd=-2;
    for(const f of faces){ const d=f.normal.clone().applyQuaternion(group.quaternion).z; if(d>bd){bd=d;best=f;} }
    resultLabel=best.label; qEnd.copy(best.quat).invert(); holdT=0; state='holding'; }
  function finish(){ state='done'; const r=document.getElementById('diceResult');
    r.textContent='🎲 '+resultLabel; r.style.opacity=1;
    setTimeout(()=>{ hide(); const cb=onDone; onDone=null; state='idle'; if(cb)cb(resultLabel); },950); }
  let last=performance.now();
  function loop(){ requestAnimationFrame(loop);
    const now=performance.now(),dt=Math.min((now-last)/1000,0.05);last=now;
    if(state==='rolling'){ const ang=omega.length()*dt;
      if(ang>1e-6)group.quaternion.premultiply(new Q().setFromAxisAngle(omega.clone().normalize(),ang));
      omega.multiplyScalar(Math.pow(0.5,dt/0.5)); rollT+=dt; if(omega.length()<0.25||rollT>5)stopRoll();
    } else if(state==='holding'){ holdT+=dt; if(holdT>=0.5){ qStart.copy(group.quaternion); tSettle=0; state='settling'; }
    } else if(state==='settling'){ tSettle+=dt/0.5; const t=Math.min(tSettle,1),e=1-Math.pow(1-t,3);
      group.quaternion.copy(qStart).slerp(qEnd,e); if(t>=1)finish(); }
    if(renderer)renderer.render(scene,camera); }
  function show(label,cb){ onDone=cb; state='idle';
    document.getElementById('diceWho').textContent=label;
    document.getElementById('diceHint').style.display='block'; document.getElementById('diceResult').style.opacity=0;
    document.getElementById('diceOverlay').classList.add('show');
    /* 覆蓋層顯示後才有真實寬度，重設渲染器尺寸（否則 init 時為 0 → 1×1 看不到）*/
    const mount=document.getElementById('diceStage'), s=Math.max(mount.clientWidth,1);
    if(renderer){ renderer.setSize(s,s); camera.aspect=1; camera.updateProjectionMatrix(); } }
  function hide(){ document.getElementById('diceOverlay').classList.remove('show'); }
  return { init, show };
})();

function htmlFloat(val,color,px,leftPct,topPct){
  const layer=$('floatLayer'); if(!layer) return;
  const el=document.createElement('div'); el.className='float';
  el.textContent=val; el.style.color=color; el.style.fontSize=px+'px';
  el.style.left=leftPct+'%'; el.style.top=topPct+'%';
  layer.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('rise'));
  setTimeout(()=>el.remove(),820);

function floatOverBar(barId,val,color,px){
  const bar=$(barId); if(!bar) return; const r=bar.getBoundingClientRect();
  const el=document.createElement('div'); el.className='float';
  el.style.position='fixed'; el.textContent=val; el.style.color=color; el.style.fontSize=px+'px';
  el.style.left=(r.left+r.width/2)+'px'; el.style.top=(r.top-4)+'px';
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('rise'));
  setTimeout(()=>el.remove(),820);
}

function setMonster(v){ const dmg=monsterHP-v; monsterHP=Math.max(0,v);
  const p=monsterHP/MAXM*100; const b=$('mbar'); b.firstElementChild.style.width=p+'%';
  b.className='bar'+(p<25?' crit':p<55?' low':''); $('mnum').textContent=monsterHP+'/'+MAXM;
  if(dmg>0 && window.Stage){ Stage.monsterHit(dmg); if(monsterHP<=0) Stage.defeat(); } }
function setTeam(v){ const delta=v-teamHP; teamHP=Math.min(MAXT,Math.max(0,v));
  const p=teamHP; const b=$('tbar'); b.firstElementChild.style.width=p+'%';
  b.className='bar'+(p<25?' crit':p<55?' low':''); $('tnum').textContent=teamHP+'/'+MAXT;
  if(window.Stage){ if(delta<0) Stage.teamHurt(-delta); else if(delta>0) Stage.teamHeal(delta); } }
function setGold(v){ gold=v; $('gold').textContent='💰 '+gold; }

function renderTabs(){ const box=$('tabs'); box.innerHTML='';
  seats.forEach((s,i)=>{ const b=document.createElement('button');
    const st=selections[s.cls]?'done':(i===current?'current':'todo'); b.className='tab '+st;
    b.innerHTML=`${s.cls}<span class="pin">座號 ${s.pin}</span>`;
    b.onclick=()=>{ if(mode!=='select')return; current=i; renderAll(); }; box.appendChild(b); });
}
function renderPanel(){ const s=seats[current]; $('curcls').textContent=s.cls; $('curname').textContent=s.name;
  const box=$('cmds'); box.innerHTML='';
  SKILLS[s.cls].forEach(sk=>{ const b=document.createElement('button'); b.className='cmd';
    b.innerHTML=`<span class="t">${sk.n}</span><span class="sub">${sk.s}</span>`; b.onclick=()=>pick(sk.n); box.appendChild(b); });
}
function renderAll(){ renderTabs(); renderPanel();
  const done=Object.keys(selections).length;
  $('phase').textContent=`選擇階段：${done}/4 已下指令`+(done<4?`　▶ 目前：${seats[current].cls}`:'　▶ 全員就緒！');
}
function pick(cmd){ if(mode!=='select')return; selections[seats[current].cls]=cmd;
  const next=seats.findIndex(s=>!selections[s.cls]);
  if(next===-1){ renderTabs(); startResolve(); return; } current=next; renderAll();
}

function actionSteps(seat){
  const cmd=selections[seat.cls], who=`${seat.cls}（${seat.name}）`;
  switch(cmd){
    case '攻擊':{ const d=6+rnd(4); return [T(`${who} 普通攻擊，造成 ${d} 傷害！`,'you',()=>setMonster(monsterHP-d))]; }
    case '連斬':{ const a=4+rnd(4),b=4+rnd(4);
      return [T(`${who} 連斬！${a}+${b}＝${a+b} 傷害！`,'you',()=>{ setMonster(monsterHP-a); setTimeout(()=>setMonster(monsterHP-b),280); })]; }
    case '重劈':{ const miss=Math.random()<0.1, d=15+rnd(6);
      return [T(miss?`${who} 重劈落空了！`:`${who} 全力重劈！造成 ${d} 傷害！`,'you',()=>{ Stage.slash(); if(miss){ Stage.miss(); } else { setMonster(monsterHP-d); } })]; }
    case '防禦': return [T(`${who} 擺出防禦，本回合全隊受傷減半。`,'you',()=>status.defend=true)];
    case '祝福': return [T(`${who} 給予祝福，我方下次攻擊必中。`,'you')];
    case '看破': return [T(`${who} 看破弱點，下次傷害提升。`,'you')];
    case '火球': return [T(`${who} 燃起火球…`,'you'), D(`${seat.cls} 擲骰：火球是否燒傷`,(r)=>{
        const d=8+(r%5), burn=r>=10;
        return [T(`火球命中，造成 ${d} 傷害。`,'you',()=>{ Stage.fire(); nextHitColor='#ff9a3d'; setMonster(monsterHP-d); if(burn) status.burn=3; }),
                T(burn?`🎲 ${r} ≥ 10 → 燒傷！之後 3 回合持續傷害`:`🎲 ${r} ＜ 10 → 未燒傷`,'sys')]; })];
    case '冰霧': return [T(`${who} 凝聚冰霧…`,'you'), D(`${seat.cls} 擲骰：冰霧是否冰凍`,(r)=>{
        const fz=r>=15;
        return [T(`冰霧命中，造成 10 傷害。`,'you',()=>{ Stage.ice(); nextHitColor='#5aa0ff'; setMonster(monsterHP-10); if(fz) status.frozen=true; }),
                T(fz?`🎲 ${r} ≥ 15 → 冰凍！怪物下次無法行動`:`🎲 ${r} ＜ 15 → 未冰凍`,'sys')]; })];
    case '治療': return [T(`${who} 詠唱治療術…`,'you'), D(`${seat.cls} 擲骰：回復量`,(r)=>{
        const h=8+Math.ceil(r/2); setTeam(teamHP+h); return [T(`🎲 ${r} → 隊伍 HP 回復 ${h}！`,'sys')]; })];
    case '偷竊': return [T(`${who} 伺機偷竊…`,'you'), D(`${seat.cls} 擲骰：偷竊`,(r)=>{
        const ok=r>=10, g=ok?4+(r%6):0; if(ok)setGold(gold+g);
        return [T(ok?`🎲 ${r} ≥ 10 → 偷竊成功！額外 ${g} 金幣`:`🎲 ${r} ＜ 10 → 偷竊失敗`, ok?'sys':'you')]; })];
    default: return [T(`${who} 使用了 ${cmd}。`,'you')];
  }
}
function monsterSteps(){
  return [DYN(()=>{
    if(status.frozen){ status.frozen=false; Stage.ice(); return {text:'ドラキー 被冰凍，無法行動！',cls:'sys'}; }
    let d=5+rnd(6); const def=status.defend; if(def) d=Math.ceil(d/2);
    setTeam(teamHP-d);
    return {text:`ドラキー 振翅撲擊！隊伍受到 ${d} 傷害${def?'（已減半）':''}。`,cls:'enemy'};
  })];
}
function endSteps(){
  return [ DYN(()=>{ if(status.burn>0){ const b=6; status.burn--; Stage.fire(); nextHitColor='#ff9a3d'; setMonster(monsterHP-b);
      return {text:`🔥 燒傷發作！怪物受到 ${b} 持續傷害（剩 ${status.burn} 回合）`,cls:'sys'}; } return null; }),
    T('—— 回合結束 ——','sys'), END() ];
}

function openNarrate(phaseTxt){
  $('selectPanel').style.display='none'; $('narrate').style.display='block';
  $('narrate').innerHTML='<span class="cursor" id="cursor">▽</span>'; $('phase').textContent=phaseTxt;
}
function startBattle(){
  openNarrate('戰鬥開始');
  renderTabs();   // 開戰即顯示四職業分頁，否則分頁空白、隊伍 HP 會佔滿整條
  steps=[
    T('ドラキー 出現了！','sys'),
    T('ドラキー 張牙舞爪，試圖向隊伍發起突襲！','enemy'),
    D('戰士 擲骰：抵擋攻擊',(r)=>{
      if(r>=10){ floatOverBar('tbar','MISS','#eaeaea',32); return [T(`🎲 ${r} ≥ 10 → 成功擋下突襲！毫髮無傷。`,'sys')]; }
      const d=5+rnd(6); setTeam(teamHP-d);
      return [T(`🎲 ${r} ＜ 10 → 沒擋住！ドラキー 突襲得逞，隊伍被打了一下，受到 ${d} 傷害！`,'enemy')];
    }),
    {kind:'toround'}
  ];
  si=0; showStep();
}
function startResolve(){
  status.defend=false;
  openNarrate('結算階段：全員行動（點文字框推進）');
  steps=[ T('⚔️ 全員行動！','sys') ];
  for(const s of seats) steps.push(...actionSteps(s));
  steps.push(...monsterSteps());
  steps.push(...endSteps());
  si=0; showStep();
}
function addLine(text,cls){ const p=document.createElement('p'); if(cls)p.className=cls; p.textContent=text;
  const n=$('narrate'); n.insertBefore(p,$('cursor')); const ps=n.querySelectorAll('p');
  if(ps.length>5) ps[0].remove(); }
function setCursor(on){ const c=$('cursor'); if(c)c.style.display=on?'block':'none'; }

function showStep(){
  if(si>=steps.length){ return; }
  const st=steps[si];
  if(st.kind==='text'){ addLine(st.text,st.cls); if(st.effect)st.effect();
    mode='click'; setCursor(true);
  } else if(st.kind==='dyn'){ const o=st.fn(); if(o===null){ si++; return showStep(); }
    addLine(o.text,o.cls); mode='click'; setCursor(true);
  } else if(st.kind==='dice'){ mode='dice'; setCursor(false);
    Dice.show(st.who,(roll)=>{ const follow=st.resolve(roll)||[]; steps.splice(si+1,0,...follow); si++; showStep(); });
  } else if(st.kind==='end'){
    if(monsterHP<=0){ addLine('✦ ドラキー 被打倒了！隊伍獲得 25 金幣 💰','sys'); setGold(gold+25); endBattle('win'); }
    else if(teamHP<=0){ addLine('✦ 隊伍全滅… 暫時撤退！','enemy'); endBattle('lose'); }
    else newRound();
  } else if(st.kind==='toround'){ newRound(); }
}
function advance(){ if(mode!=='click')return;
  if(monsterHP<=0 && steps[si] && steps[si].kind!=='end'){
    si=steps.length-1; if(!steps[si]||steps[si].kind!=='end')steps.push(END()); }
  else si++;
  setCursor(false); showStep();
}
function newRound(){ selections={}; current=0; mode='select'; status.defend=false;
  $('narrate').style.display='none'; $('selectPanel').style.display='flex'; renderAll(); }
function endBattle(r){ mode='done'; setCursor(false);
  $('phase').textContent = r==='win'?'勝利！按「↻ 重置戰鬥」再玩一次':'戰敗… 按「↻ 重置戰鬥」再玩一次'; }

$('narrate').addEventListener('click',advance);
$('reset').addEventListener('click',()=>{ monsterHP=60;teamHP=100;gold=0;status={burn:0,frozen:false,defend:false};
  if(window.Stage)Stage.resetMonster(); setMonster(60);setTeam(100);setGold(0);startBattle(); });

/* =================== Phaser 舞台 =================== */
/* 用 HTML Image 載入 base64（穩定可靠，且 file:// 不被擋），再塞進 Phaser */
function loadImg(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; if(i.complete&&i.naturalWidth) res(i); }); }
function cre(){
  const W=this.scale.width, H=this.scale.height, scene=this;
  if(window.IMG&&window.IMG.bg&&!this.textures.exists('bg')) this.textures.addImage('bg',window.IMG.bg);
  if(window.IMG&&window.IMG.draky&&!this.textures.exists('draky')) this.textures.addImage('draky',window.IMG.draky);
  if(this.textures.exists('bg')){ const bg=this.add.image(W/2,H/2,'bg'); bg.setScale(Math.max(W/bg.width,H/bg.height)); }
  this.add.rectangle(W/2,H/2,W,H,0x0a0608,0.26);

  const MX=W/2, MY=H*0.56;
  this.add.ellipse(MX,MY+72,140,24,0x000000,0.35);
  const m=this.add.sprite(MX,MY,this.textures.exists('draky')?'draky':'__DEFAULT');
  if(this.textures.exists('draky')) m.setScale(200/m.width); this.monster=m;
  this.tweens.add({targets:m,y:'-=8',duration:1400,yoyo:true,repeat:-1,ease:'Sine.inOut'});

  // 劈砍光刃貼圖
  const g=this.make.graphics({add:false});
  g.lineStyle(16,0xffffff,1); g.beginPath(); g.arc(90,90,72,Phaser.Math.DegToRad(-58),Phaser.Math.DegToRad(58)); g.strokePath();
  g.lineStyle(6,0x9fe8ff,0.95); g.beginPath(); g.arc(90,90,72,Phaser.Math.DegToRad(-52),Phaser.Math.DegToRad(52)); g.strokePath();
  g.generateTexture('slash',180,180); g.destroy();

  this.vig=this.add.rectangle(W/2,H/2,W,H,0xd21a1a,0).setDepth(5);
  this.tintFx=this.add.rectangle(W/2,H/2,W,H,0xffffff,0).setDepth(5);

  function blink(times,color){ let n=0; const tk=()=>{ m.setTintFill(color||0xffffff);
    scene.time.delayedCall(55,()=>{ m.clearTint(); if(++n<times) scene.time.delayedCall(45,tk); }); }; tk(); }
  function floatNum(val,color,size,x,y){
    const t=scene.add.text(x,y,''+val,{fontFamily:'Cubic 11',fontSize:size+'px',color:color,
      stroke:'#3a1500',strokeThickness:6}).setOrigin(0.5).setDepth(8);
    scene.tweens.add({targets:t,y:y-70,alpha:{from:1,to:0},duration:760,ease:'Cubic.out',onComplete:()=>t.destroy()}); }

  window.Stage={
    monsterHit(dmg){
      scene.cameras.main.shake(120, Math.min(0.014, 0.004+dmg*0.0005));
      blink(2,0xffffff);
      scene.tweens.add({targets:m,x:MX+14,duration:60,yoyo:true});
      const col=nextHitColor||'#ff5a4d', px=dmg>=15?34:30; nextHitColor=null;  // 先擷取顏色，數字延後 0.26 秒才飄（與特效錯開）
      scene.time.delayedCall(260,()=>htmlFloat(dmg,col,px, 50+(Math.random()*12-6), 36));
    },
    slash(){
      const sl=scene.add.image(MX,MY,'slash').setScale(0.5).setAngle(-75).setAlpha(0).setDepth(7);
      scene.tweens.add({targets:sl,alpha:{from:1,to:0},angle:48,scale:1.75,duration:240,ease:'Cubic.out',onComplete:()=>sl.destroy()});
      scene.cameras.main.flash(150,255,255,255);
    },
    fire(){ scene.tintFx.setFillStyle(0xff7a1a); scene.tintFx.alpha=0;
      scene.tweens.add({targets:scene.tintFx,alpha:0.35,duration:80,yoyo:true});
      blink(2,0xff7a2a); scene.cameras.main.shake(140,0.008); },
    ice(){ scene.tintFx.setFillStyle(0x6fd6ff); scene.tintFx.alpha=0;
      scene.tweens.add({targets:scene.tintFx,alpha:0.30,duration:120,yoyo:true,hold:120});
      blink(2,0x9fe8ff); },
    teamHurt(dmg){ scene.vig.alpha=0;
      scene.tweens.add({targets:scene.vig,alpha:0.45,duration:90,yoyo:true});
      scene.cameras.main.shake(160,0.01);
      floatOverBar('tbar',dmg,'#ff5a4d',30); },
    teamHeal(amt){ floatOverBar('tbar','+'+amt,'#6ff06a',30);
      scene.tintFx.setFillStyle(0x6ff06a); scene.tintFx.alpha=0;
      scene.tweens.add({targets:scene.tintFx,alpha:0.22,duration:120,yoyo:true}); },
    miss(){ htmlFloat('MISS','#eaeaea',32, 38, 38); },
    defeat(){ scene.tweens.add({targets:m,alpha:0,angle:22,y:MY+18,duration:600,ease:'Cubic.in'}); },
    resetMonster(){ m.setAlpha(1).setAngle(0).setPosition(MX,MY); }
  };

  Dice.init();
  setMonster(60); setTeam(100); setGold(0); startBattle();
}

async function boot(){
  // 從內嵌 base64 載圖；最多等 3 秒，逾時也照常開場（絕不卡住）
  const [bg,draky]=await Promise.race([
    Promise.all([ loadImg(BG_DATA), loadImg(DRAKY_DATA) ]),
    new Promise(r=>setTimeout(()=>r([null,null]),3000))
  ]);
  window.IMG={bg,draky};
  new Phaser.Game({
    type:Phaser.AUTO, parent:'game',
    width:900, height:380, backgroundColor:'#0a0608',
    pixelArt:true, roundPixels:true,
    scale:{ mode:Phaser.Scale.FIT, autoCenter:Phaser.Scale.CENTER_BOTH },
    scene:{ create:cre }
  });
}
if(document.fonts && document.fonts.load){
  document.fonts.load("18px 'Cubic 11'").then(boot).catch(boot);
}else{ boot(); }
</script>
</body>
