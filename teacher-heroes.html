  :root{
    --ink:#3a2814;        /* 主墨色 */
    --ink-soft:#6b5740;   /* 淡墨（標籤） */
    --ink-faint:#917a5c;
    --paper-line:#cbb68c;
    --gold:#e7b84f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"ToneOZ","KaiTi","DFKai-SB","Microsoft JhengHei",serif;
    color:#f3e3c4;
    background:linear-gradient(165deg,#150d07,#080503);
    min-height:100%; position:relative;
    display:flex; flex-direction:column; align-items:center;
    padding:18px 14px 30px;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(700px 460px at 20% 6%, #ff9a3d28, transparent 60%),
      radial-gradient(700px 460px at 80% 6%, #ff8a3222, transparent 60%),
      radial-gradient(1200px 900px at 50% 50%, transparent 55%, #000000aa 100%);
    animation:flicker 4.5s ease-in-out infinite;
  }
  @keyframes flicker{0%,100%{opacity:1;}45%{opacity:.93;}70%{opacity:.97;}85%{opacity:.9;}}

  /* ── 頂列 ── */
  .topbar{
    width:100%; max-width:960px; z-index:2;
    display:flex; align-items:center; gap:14px; margin-bottom:8px;
  }
  .navbtn{
    font-family:inherit; font-size:20px; cursor:pointer; color:#f3e3c4;
    background:#1c1107; border:2px solid #4a3320;
    padding:6px 16px; border-radius:4px;
  }
  .navbtn:hover{ color:var(--gold); border-color:#6a4a26; }
  .ptitle{ font-size:30px; letter-spacing:3px; color:var(--gold);
    text-shadow:0 0 10px #ff9a3d44, 2px 2px 0 #2a1808; }

  /* ── 書本 ── */
  .book{
    position:relative; z-index:1; container-type:inline-size;
    width:min(95vw, 960px); aspect-ratio:1260 / 848;
    background:url("assets/book-clean.png") center/contain no-repeat;
    filter:drop-shadow(0 14px 30px #000a);
  }
  .page{ position:absolute; overflow:hidden; }
  .page.left{  left:19%;  width:28%;   top:13%; height:64%; }
  .page.right{ left:53%;   width:29.5%; top:13%; height:64%; }
  /* 個人頁用較緊內縮（避開四角花邊） */
  .detail .page.left{ left:20%; width:24%; top:18%; height:55%; }

  /* ── 名冊（兩頁各 2 欄） ── */
  .roster{ height:100%; display:grid; grid-template-columns:1fr 1fr;
    grid-template-rows:repeat(4,1fr); grid-auto-flow:column; gap:2% 6%;
    align-content:center; }
  .namebox{
    display:flex; flex-direction:column; justify-content:center; gap:1px; cursor:pointer;
    min-width:0; overflow:hidden; padding:3px 5px; border-radius:3px;
  }
  .namebox:hover{ background:#00000012; }
  .namebox .nmrow{ display:flex; align-items:baseline; gap:6px; min-width:0;
    color:var(--ink); font-size:2.4cqw; line-height:1.1; white-space:nowrap; }
  .namebox .seat{ color:var(--ink-faint); min-width:1.4em; text-align:left; flex:none; }
  .namebox .nm{ overflow:hidden; text-overflow:ellipsis; }
  .namebox:hover .nm{ text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:3px; }
  .namebox .subrow{ display:flex; align-items:center; gap:5px; min-width:0; }
  .lvtag{ color:var(--ink-faint); font-size:1.5cqw; white-space:nowrap; flex:none; }
  .minibar{ width:5cqw; flex:none; height:.7cqw; min-height:5px; background:#cbb68c55;
    border:1px solid #b59a6a; border-radius:2px; overflow:hidden; }
  .minifill{ display:block; height:100%; background:#7a9a3a; }

  /* ── 個人頁・左頁 ── */
  .dname{ color:var(--ink); font-size:4.2cqw; line-height:1.1;
    border-bottom:2px solid var(--paper-line); padding-bottom:6px; margin-bottom:14px; }
  .drow{ display:flex; align-items:baseline; gap:10px; margin:10px 0; }
  .drow .lab{ color:var(--ink-soft); font-size:2.3cqw; min-width:3.2em; }
  .drow .val{ color:var(--ink); font-size:2.9cqw; }
  .drow .val.cls{ color:#7a3a16; }

  /* ── 個人頁・右頁（任務） ── */
  .page.right.quests{ left:54%; width:27%; top:18%; height:55%; }
  .tabs{ display:flex; gap:6px; margin-bottom:8px; }
  .tabs button{
    font-family:inherit; cursor:pointer; font-size:2.1cqw;
    color:var(--ink-soft); background:transparent; border:none;
    border-bottom:2px solid transparent; padding:2px 8px 4px; }
  .tabs button.on{ color:var(--ink); border-bottom-color:#7a3a16; }
  .qlist{ height:calc(100% - 38px); overflow-y:auto; padding-right:6px; }
  .qlist::-webkit-scrollbar{ width:8px; }
  .qlist::-webkit-scrollbar-thumb{ background:#b59a6a; border-radius:4px; }
  .qrow{ display:flex; align-items:flex-start; gap:6px;
    padding:5px 2px; border-bottom:1px dashed var(--paper-line);
    color:var(--ink); font-size:1.85cqw; }
  .qrow .qn{ flex:1; white-space:normal; word-break:break-all; line-height:1.25; }
  .qrow .qx{ color:#3f6a2a; white-space:nowrap; }
  .qrow .qt{ color:var(--ink-faint); white-space:nowrap; font-size:.82em; }
  .qempty{ color:var(--ink-faint); padding:14px 4px; }

  /* ── 個人頁：等級列的「前次結算」 ── */
  .lvwrap{ display:flex; flex-direction:column; gap:1px; }
  .settle{ color:var(--ink-faint); font-size:1.5cqw; white-space:nowrap; }
  /* 經驗：數字縮小 + 經驗條，整體高度≈「經驗」二字 */
  .exprow{ align-items:center; }
  .expwrap{ display:flex; flex-direction:column; gap:2px; }
  .expnum{ color:var(--ink); font-size:1.55cqw; line-height:1; }
  .expbar{ width:13cqw; height:.8cqw; min-height:6px; background:#cbb68c55;
    border:1px solid #b59a6a; border-radius:2px; overflow:hidden; }
  .expfill{ display:block; height:100%; background:#7a9a3a; }
  /* 左頁排成直欄，技能表佔滿剩餘空間並可滾動 */
  #detailLeft{ display:flex; flex-direction:column; }
  .skilltbl{ flex:1; min-height:0; overflow-y:auto; margin-top:8px;
    border-top:1px solid var(--paper-line); padding:5px 4px 0 0; }
  .skilltbl::-webkit-scrollbar{ width:7px; }
  .skilltbl::-webkit-scrollbar-thumb{ background:#b59a6a; border-radius:4px; }
  .srow{ display:flex; gap:8px; padding:2px 2px; cursor:default; font-size:1.6cqw; line-height:1.3; }
  .srow .slv{ min-width:3.6em; }
  .srow.got{ color:var(--ink); }
  .srow.nope{ color:#b1a184; }
  .srow:hover{ background:#00000010; }
  /* 技能效果浮動提示 */
  #tip{ position:fixed; z-index:60; background:#1c1107; color:#f3e3c4;
    border:1px solid #6a4a26; padding:5px 9px; font-size:14px; max-width:220px;
    border-radius:4px; box-shadow:0 4px 12px #000a; pointer-events:none; line-height:1.4; }

  /* 翻頁 */
  .pager{ display:flex; align-items:center; gap:16px; margin-top:12px; z-index:2;
    color:#cbb389; font-size:18px; }
  .pager button{ font-family:inherit; cursor:pointer; font-size:17px; color:#f3e3c4;
    background:#1c1107; border:2px solid #4a3320; padding:5px 16px; border-radius:4px; }
  .pager button:disabled{ opacity:.3; cursor:default; }

  /* 操作方塊（新增學生 / 等級結算 / 編輯經驗 / 刪除冒險者）— 無框無底，滑過圖標晃動 */
  .actions{ position:fixed; right:24px; bottom:18px; z-index:5; display:flex; gap:24px; align-items:flex-end; }
  .actbtn{ display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; cursor:pointer; }
  .actbtn img{ height:48px; width:auto; image-rendering:pixelated;
    filter:drop-shadow(0 3px 6px #000a); transition:transform .12s ease; }
  .actbtn span{ font-size:14px; color:#f3e3c4; text-shadow:0 1px 3px #000; letter-spacing:1px; }
  .actbtn:hover img{ transform:translateY(-4px) rotate(-5deg); }
  .actbtn.danger:hover img{ transform:translateY(-4px) rotate(5deg); }

  [hidden]{ display:none !important; }

  /* 音樂開關鈕 */
  .musbtn{
    position:fixed; right:14px; top:14px; z-index:60;
    font-family:inherit; font-size:18px; color:#f3e3c4;
    background:#2a1d12cc; border:2px solid #6b4a2a; border-radius:8px;
    padding:6px 12px; cursor:pointer; letter-spacing:1px;
    box-shadow:0 2px 0 #00000066; }
  .musbtn:hover{ background:#3a281acc; }
  .musbtn.off{ color:#bfae90; border-color:#4a3a2a; }
</style>
</head>
<body>
  <div class="topbar">
    <button class="navbtn" id="backBtn">⟵ 返回</button>
    <div class="ptitle" id="ptitle">冒險者名冊</div>
  </div>

  <!-- 名冊 -->
  <div class="book" id="rosterView">
    <div class="page left"><div class="roster" id="rosterLeft"></div></div>
    <div class="page right"><div class="roster" id="rosterRight"></div></div>
  </div>

  <!-- 個人頁 -->
  <div class="book detail" id="detailView" hidden>
    <div class="page left" id="detailLeft"></div>
    <div class="page right quests">
      <div class="tabs">
        <button data-tab="short" class="on">短期任務</button>
        <button data-tab="long">長期任務</button>
      </div>
      <div class="qlist" id="qlist"></div>
    </div>
  </div>

  <div class="pager" id="pager" hidden>
    <button id="prevPage">⟵ 上一頁</button>
    <span id="pageInd"></span>
    <button id="nextPage">下一頁 ⟶</button>
  </div>

  <div class="actions" id="rosterActions" hidden>
    <button class="actbtn" id="settleBtn"><img src="assets/icons/settle.png" alt=""><span>等級結算</span></button>
    <button class="actbtn" id="addBtn"><img src="assets/quill.png" alt=""><span>新增學生</span></button>
  </div>

  <div class="actions" id="detailActions" hidden>
    <button class="actbtn" id="editXp"><img src="assets/icons/xp.png" alt=""><span>編輯經驗值</span></button>
    <button class="actbtn danger" id="delHero"><img src="assets/icons/delete.png" alt=""><span>刪除冒險者</span></button>
  </div>

  <div id="tip" hidden></div>

  <button class="musbtn off" id="musBtn" type="button">♪ 音樂 關</button>
  <audio id="bgm" src="assets/music/heroes.ogg" loop preload="auto"></audio>

  <script src="data/classData.js"></script>
  <script>
    var D = window.CLASS_DATA;
    var rosterView = document.getElementById("rosterView");
    var detailView = document.getElementById("detailView");
    var titleEl    = document.getElementById("ptitle");
    var backBtn    = document.getElementById("backBtn");
    var pager      = document.getElementById("pager");
    var pageInd    = document.getElementById("pageInd");
    var addBtn        = document.getElementById("addBtn");
    var rosterActions = document.getElementById("rosterActions");
    var detailActions = document.getElementById("detailActions");
    var view = "roster", curId = null, curTab = "short", spread = 0;
    var PER_SPREAD = 24;   // 4 欄 × 每欄上限 6 列

    // HTML 跳脫：使用者輸入（姓名）或資料字串塞進 innerHTML 前都先過一次
    function esc(s){
      return String(s).replace(/[&<>"]/g, function(c){
        return { "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c];
      });
    }

    function nameBox(s){
      return '<div class="namebox" data-id="'+s.id+'">'
           +   '<div class="nmrow"><span class="seat">'+s.id+'</span><span class="nm">'+esc(s.name)+'</span></div>'
           +   '<div class="subrow"><span class="lvtag">Lv.'+s.level+'</span>'
           +     '<span class="minibar"><span class="minifill" style="width:'+s.exp+'%"></span></span></div>'
           + '</div>';
    }
    function totalSpreads(){ return Math.max(1, Math.ceil(D.students.length / PER_SPREAD)); }

    function renderRoster(){
      var total = totalSpreads();
      spread = Math.max(0, Math.min(spread, total - 1));
      var slice = D.students.slice(spread * PER_SPREAD, spread * PER_SPREAD + PER_SPREAD);
      var rows = Math.min(6, Math.max(1, Math.ceil(slice.length / 4))), half = rows * 2;
      var e1 = document.getElementById("rosterLeft"), e2 = document.getElementById("rosterRight");
      e1.style.gridTemplateRows = e2.style.gridTemplateRows = "repeat(" + rows + ",1fr)";
      e1.innerHTML = slice.slice(0, half).map(nameBox).join("");
      e2.innerHTML = slice.slice(half).map(nameBox).join("");
      if(total > 1){
        pager.hidden = false;
        pageInd.textContent = "第 " + (spread + 1) + " / " + total + " 頁";
        document.getElementById("prevPage").disabled = (spread === 0);
        document.getElementById("nextPage").disabled = (spread === total - 1);
      } else { pager.hidden = true; }
    }
    function showRoster(){
      view = "roster"; detailView.hidden = true; rosterView.hidden = false;
      rosterActions.hidden = false; detailActions.hidden = true; titleEl.textContent = "冒險者名冊";
      renderRoster();
    }
    function renderQuests(){
      var list = D.recentQuests(curId, curTab).slice(0, 10);
      var el = document.getElementById("qlist");
      if(!list.length){ el.innerHTML = '<div class="qempty">尚無紀錄</div>'; return; }
      el.innerHTML = list.map(function(q){
        return '<div class="qrow"><span class="qn">'+q.name+'</span>'
             + '<span class="qx">+'+q.exp+'</span><span class="qt">'+q.time+'</span></div>';
      }).join("");
    }
    function showDetail(id){
      view = "detail"; curId = id; curTab = "short";
      var s = D.studentById(id);
      document.getElementById("detailLeft").innerHTML =
          '<div class="dname">'+esc(s.name)+'</div>'
        + '<div class="drow"><span class="lab">職業</span><span class="val cls">'+esc(s.cls)+'</span></div>'
        + '<div class="drow"><span class="lab">等級</span>'
        +   '<span class="lvwrap"><span class="val">Lv.'+s.level+'</span>'
        +     '<span class="settle">前次結算：Lv.'+s.settledLevel+'</span></span></div>'
        + '<div class="drow exprow"><span class="lab">經驗</span>'
        +   '<span class="expwrap"><span class="expnum">'+s.exp+' / 100</span>'
        +     '<span class="expbar"><span class="expfill" style="width:'+s.exp+'%"></span></span>'
        +   '</span></div>'
        + '<div class="skilltbl" id="skilltbl"></div>';
      renderSkills(s);
      document.querySelectorAll(".tabs button").forEach(function(b){
        b.classList.toggle("on", b.getAttribute("data-tab") === "short");
      });
      renderQuests();
      rosterView.hidden = true; detailView.hidden = false;
      rosterActions.hidden = true; detailActions.hidden = false; pager.hidden = true;
      titleEl.textContent = "座號 " + s.id + "　" + s.name;
    }

    // 點名字 → 個人頁
    document.querySelectorAll("#rosterLeft, #rosterRight").forEach(function(c){
      c.addEventListener("click", function(e){
        var box = e.target.closest(".namebox"); if(!box) return;
        showDetail(parseInt(box.getAttribute("data-id"), 10));
      });
    });
    // 任務分頁
    document.querySelectorAll(".tabs button").forEach(function(b){
      b.addEventListener("click", function(){
        curTab = b.getAttribute("data-tab");
        document.querySelectorAll(".tabs button").forEach(function(x){ x.classList.remove("on"); });
        b.classList.add("on"); renderQuests();
      });
    });
    // 翻頁
    document.getElementById("prevPage").addEventListener("click", function(){ spread--; renderRoster(); });
    document.getElementById("nextPage").addEventListener("click", function(){ spread++; renderRoster(); });
    // 新增學生（羽毛筆）→ 只要座號＋姓名
    addBtn.addEventListener("click", function(){
      var seat = prompt("輸入座號（數字）：");
      if(seat === null) return;
      seat = seat.trim();
      if(!/^\d+$/.test(seat) || parseInt(seat, 10) < 1){ alert("座號需為正整數"); return; }
      seat = parseInt(seat, 10);
      if(D.studentById(seat)){ alert("座號 " + seat + " 已存在"); return; }
      var name = prompt("輸入姓名：");
      if(name === null) return;
      name = (name || "").trim(); if(!name){ alert("姓名不可空白"); return; }
      D.students.push({ id:seat, name:name, cls:"未指派", level:1, exp:0, settledLevel:1 });
      D.students.sort(function(a,b){ return a.id - b.id; });
      var idx = D.students.findIndex(function(s){ return s.id === seat; });
      spread = Math.floor(idx / PER_SPREAD);
      renderRoster();
    });
    // 等級結算：把全班目前等級記錄成「前次結算」
    document.getElementById("settleBtn").addEventListener("click", function(){
      if(!confirm("將全班目前等級記錄為「前次結算」？\n之後個人頁的前次結算會更新為現在等級。")) return;
      D.students.forEach(function(s){ s.settledLevel = s.level; });
      alert("已完成等級結算（共 " + D.students.length + " 人）。");
    });
    function renderSkills(s){
      var tbl = (D.skillTable && D.skillTable[s.cls]) || [];
      var el = document.getElementById("skilltbl");
      if(!tbl.length){ el.innerHTML = '<div class="qempty">尚未指派職業，無技能表</div>'; return; }
      el.innerHTML = tbl.map(function(sk, i){
        var lv = i + 1, got = lv <= s.level;
        return '<div class="srow ' + (got ? "got" : "nope") + '" data-eff="' + esc(sk.e) + '">'
             + '<span class="slv">Lv.' + lv + '</span><span class="snm">' + esc(sk.n) + '</span></div>';
      }).join("");
    }
    // 技能效果懸停提示
    var tip = document.getElementById("tip");
    document.addEventListener("mouseover", function(e){
      var row = e.target.closest ? e.target.closest(".srow") : null;
      if(!row) return;
      tip.textContent = row.getAttribute("data-eff");
      tip.hidden = false;
      var r = row.getBoundingClientRect();
      tip.style.left = Math.min(r.right + 10, window.innerWidth - 232) + "px";
      tip.style.top = (r.top - 2) + "px";
    });
    document.addEventListener("mouseout", function(e){
      if(e.target.closest && e.target.closest(".srow")) tip.hidden = true;
    });
    // 編輯經驗值（可增減；跨級自動升/降級，技能隨之更新）
    document.getElementById("editXp").addEventListener("click", function(){
      var s = D.studentById(curId); if(!s) return;
      var raw = prompt("輸入經驗增減值（正數加、負數減）：", "0");
      if(raw === null) return;
      var delta = parseInt(raw, 10);
      if(isNaN(delta)){ alert("請輸入數字"); return; }
      var MAXLV = 20;   // 對齊技能表上限，避免等級無上限暴衝
      var total = Math.max(0, Math.min(MAXLV * 100 - 1, (s.level - 1) * 100 + s.exp + delta));
      s.level = Math.floor(total / 100) + 1;
      s.exp = total % 100;
      showDetail(s.id);   // 重繪：等級、經驗條、技能表黑/灰一起更新
    });
    // 刪除冒險者
    document.getElementById("delHero").addEventListener("click", function(){
      var s = D.studentById(curId); if(!s) return;
      if(!confirm("確定刪除冒險者「" + s.name + "」？此動作無法復原。")) return;
      var i = D.students.findIndex(function(x){ return x.id === curId; });
      if(i >= 0) D.students.splice(i, 1);
      showRoster();
    });
    // 返回：個人頁→名冊；名冊→控制台
    backBtn.addEventListener("click", function(){
      if(view === "detail") showRoster();
      else location.href = "teacher-home.html";
    });

    showRoster();

    /* ===== 背景音樂 ===== */
    (function(){
      var bgm = document.getElementById("bgm");
      var btn = document.getElementById("musBtn");
      var on = false;
      function set(v){
        on = v;
        if(on){ bgm.volume = 0.5; bgm.play().catch(function(){}); }
        else { bgm.pause(); }
        btn.textContent = "♪ 音樂 " + (on ? "開" : "關");
        btn.classList.toggle("off", !on);
      }
      btn.addEventListener("click", function(){ set(!on); });
      addEventListener("pointerdown", function once(){ if(!on) set(true); }, { once:true });
    })();
  </script>
</body>
</html>
